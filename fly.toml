# Staging Waylo — backend Fastify. Région EU (RGPD : données en zone UE).
# Secrets via `fly secrets set DATABASE_URL=… STRIPE_SECRET_KEY=… STRIPE_WEBHOOK_SECRET=…
#   STRIPE_ISSUING_WEBHOOK_SECRET=… JWT_SECRET=…` (jamais dans ce fichier).
app = "waylo-staging"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  HOST = "0.0.0.0"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    method = "GET"
    path = "/health"
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
